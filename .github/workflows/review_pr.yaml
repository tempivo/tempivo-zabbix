# Based on https://github.com/zabbix/community-templates/blob/main/.github/workflows/review_pr.yaml
# Spins up Zabbix 7.0 and imports changed templates via the API (configuration.import).

name: Review PR

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  changed_files:
    runs-on: ubuntu-latest
    name: Check changed files in PR
    permissions:
      pull-requests: read

    services:
      postgres-server_70:
        image: postgres
        env:
          POSTGRES_DB: zabbix
          POSTGRES_USER: zabbix
          POSTGRES_PASSWORD: zabbix
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      zabbix-server_70:
        image: zabbix/zabbix-server-pgsql:7.0-alpine-latest
        env:
          DB_SERVER_HOST: postgres-server_70
          POSTGRES_DB: zabbix
          POSTGRES_USER: zabbix
          POSTGRES_PASSWORD: zabbix

      zabbix-web_70:
        image: zabbix/zabbix-web-nginx-pgsql:7.0-alpine-latest
        ports:
          - "8070:8080"
        env:
          ZBX_SERVER_HOST: zabbix-server_70
          DB_SERVER_HOST: postgres-server_70
          POSTGRES_DB: zabbix
          POSTGRES_USER: zabbix
          POSTGRES_PASSWORD: zabbix
          PHP_TZ: Europe/Riga

    steps:
      - uses: actions/checkout@v4

      - name: Install python3
        run: |
          sudo apt update
          sudo apt install -y python3 python3-pip python-is-python3
          pip3 install -r .github/workflows/scripts/requirements.txt

      - name: Run checks
        run: python3 .github/workflows/scripts/check_rules_all.py
